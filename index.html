<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>XAUUSD ATH Alert</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
  .header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo{font-size:16px;font-weight:700;color:#ffd700;letter-spacing:1px}
  .price-badge{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 12px;text-align:right}
  .price-val{font-size:20px;font-weight:700;color:#ffd700;font-family:monospace}
  .price-chg{font-size:11px;margin-top:1px}
  .up{color:#3fb950}.down{color:#f85149}.neu{color:#8b949e}
  .section{padding:12px 16px}
  .sec-title{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  /* Chart */
  #chart-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;margin-bottom:4px}
  #chart{width:100%;height:220px}
  .tf-row{display:flex;gap:6px;padding:8px 12px;background:#161b22;border:1px solid #30363d;border-top:none;border-radius:0 0 10px 10px;margin-bottom:12px}
  .tf-btn{flex:1;padding:5px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:12px;cursor:pointer;transition:.2s}
  .tf-btn.active{background:#ffd700;color:#0d1117;border-color:#ffd700;font-weight:700}
  /* Near/Touch levels */
  .alert-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .alert-card{background:#161b22;border-radius:10px;padding:12px;text-align:center}
  .alert-card.near{border:1px solid #d29922}
  .alert-card.touch{border:1px solid #f85149}
  .alert-card .lbl{font-size:10px;color:#8b949e;margin-bottom:4px}
  .alert-card .lvl{font-size:18px;font-weight:700;font-family:monospace}
  .alert-card.near .lvl{color:#ffa500}
  .alert-card.touch .lvl{color:#f85149}
  .alert-card .dist{font-size:10px;color:#8b949e;margin-top:2px}
  /* Levels list */
  .levels-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;margin-bottom:12px}
  .level-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #21262d;transition:.2s}
  .level-row:last-child{border-bottom:none}
  .level-row.nearest{background:#1c2a1a}
  .level-row.near-warn{background:#2a1e0a}
  .level-dot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0}
  .dot-green{background:#3fb950}.dot-yellow{background:#ffa500}.dot-red{background:#f85149}
  .level-num{font-size:15px;font-weight:600;font-family:monospace;flex:1}
  .level-dist{font-size:11px;color:#8b949e;text-align:right}
  .level-tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px}
  .tag-nearest{background:#1f4d2b;color:#3fb950}
  .tag-near{background:#3d2e0a;color:#ffa500}
  /* Settings */
  .settings-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
  .input-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
  .input-row label{font-size:12px;color:#8b949e;width:90px;flex-shrink:0}
  .inp{flex:1;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:7px 10px;color:#e6edf3;font-size:13px;outline:none}
  .inp:focus{border-color:#ffd700}
  .btn{padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
  .btn-gold{background:#ffd700;color:#0d1117;width:100%}
  .btn-gold:hover{background:#e6c200}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn-danger{background:#21262d;color:#f85149;border:1px solid #f85149}
  /* Textarea for paste */
  .paste-area{width:100%;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:8px;color:#e6edf3;font-size:12px;font-family:monospace;resize:vertical;min-height:80px;outline:none}
  .paste-area:focus{border-color:#ffd700}
  /* MT5 button */
  .mt5-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:linear-gradient(135deg,#1a3a5c,#0d2137);border:1px solid #1f6feb;border-radius:10px;color:#58a6ff;font-size:15px;font-weight:700;cursor:pointer;text-decoration:none;margin-bottom:12px;transition:.2s}
  .mt5-btn:active{background:#0d2137}
  /* Notif banner */
  .banner{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13px;display:none}
  .banner.show{display:block}
  .banner-warn{background:#3d2e0a;border:1px solid #d29922;color:#ffa500}
  .banner-alert{background:#2d0f0f;border:1px solid #f85149;color:#f85149}
  /* Tabs */
  .tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:57px;z-index:99}
  .tab{flex:1;padding:10px;text-align:center;font-size:12px;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
  .tab.active{color:#ffd700;border-bottom-color:#ffd700}
  .tab-content{display:none}
  .tab-content.active{display:block}
  .status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#3fb950;margin-right:5px;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .empty-msg{text-align:center;color:#8b949e;padding:24px;font-size:13px}
  .notif-perm{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#8b949e;display:flex;align-items:center;justify-content:space-between;gap:8px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">⚡ XAUUSD</div>
  <div class="price-badge">
    <div class="price-val" id="livePrice">—</div>
    <div class="price-chg neu" id="priceChg">loading...</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
  <div class="tab" onclick="switchTab('levels')">📋 Levels</div>
  <div class="tab" onclick="switchTab('settings')">⚙️ Settings</div>
</div>

<!-- DASHBOARD TAB -->
<div class="tab-content active" id="tab-dashboard">
  <div class="section">
    <div id="banner-near" class="banner banner-warn">🟡 <span id="banner-near-text"></span></div>
    <div id="banner-touch" class="banner banner-alert">🔴 <span id="banner-touch-text"></span></div>

    <div class="sec-title"><span class="status-dot"></span>Live Chart</div>
    <div id="chart-wrap">
      <div id="chart"></div>
    </div>
    <div class="tf-row">
      <button class="tf-btn active" onclick="setTF('1m',this)">1m</button>
      <button class="tf-btn" onclick="setTF('5m',this)">5m</button>
      <button class="tf-btn" onclick="setTF('15m',this)">15m</button>
      <button class="tf-btn" onclick="setTF('1h',this)">1h</button>
    </div>

    <div class="sec-title">Nearest ATH Levels</div>
    <div class="alert-cards">
      <div class="alert-card near">
        <div class="lbl">🟡 ABOVE</div>
        <div class="lvl" id="nearest-above">—</div>
        <div class="dist" id="dist-above">—</div>
      </div>
      <div class="alert-card touch">
        <div class="lbl">🔴 BELOW</div>
        <div class="lvl" id="nearest-below">—</div>
        <div class="dist" id="dist-below">—</div>
      </div>
    </div>

    <a class="mt5-btn" href="metatrader5://" id="mt5-link">
      📈 Open MT5
    </a>
  </div>
</div>

<!-- LEVELS TAB -->
<div class="tab-content" id="tab-levels">
  <div class="section">
    <div class="sec-title">ATH Grid Levels (3500–6000)</div>
    <div class="levels-wrap" id="levelsList">
      <div class="empty-msg">ยังไม่มี levels — ไปที่ ⚙️ Settings เพื่อเพิ่มครับ</div>
    </div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div class="tab-content" id="tab-settings">
  <div class="section">
    <div class="sec-title">Notification</div>
    <div class="notif-perm" id="notifPerm">
      🔔 Push Notification ยังไม่ได้เปิด
      <button class="btn btn-sm btn-gold" onclick="requestNotif()">เปิด</button>
    </div>
    <div class="settings-wrap">
      <div class="input-row">
        <label>Near Zone (±$)</label>
        <input class="inp" type="number" id="nearZone" value="5" min="1" max="50">
      </div>
      <div class="input-row">
        <label>Refresh (วิ)</label>
        <input class="inp" type="number" id="refreshSec" value="30" min="10" max="300">
      </div>
      <button class="btn btn-gold" onclick="saveSettings()">💾 บันทึก Settings</button>
    </div>

    <div class="sec-title" style="margin-top:16px">เพิ่ม Level ทีละตัว</div>
    <div class="settings-wrap">
      <div class="input-row">
        <label>ราคา ($)</label>
        <input class="inp" type="number" id="newLevel" placeholder="เช่น 3500" step="0.5">
      </div>
      <button class="btn btn-gold" onclick="addLevel()">➕ เพิ่ม Level</button>
    </div>

    <div class="sec-title" style="margin-top:16px">Paste หลาย Levels (จาก Excel)</div>
    <div class="settings-wrap">
      <textarea class="paste-area" id="pasteArea" placeholder="วาง levels จาก Excel หรือพิมพ์เอง&#10;คั่นด้วย Enter, comma หรือ space&#10;เช่น:&#10;3500&#10;3550&#10;3600"></textarea>
      <br><br>
      <button class="btn btn-gold" onclick="importPaste()">📥 Import Levels</button>
    </div>

    <div class="settings-wrap" style="margin-top:12px">
      <button class="btn btn-danger btn-sm" style="width:100%" onclick="clearLevels()">🗑️ ล้าง Levels ทั้งหมด</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────
let levels = JSON.parse(localStorage.getItem('ath_levels') || '[]');
let settings = JSON.parse(localStorage.getItem('ath_settings') || '{"nearZone":5,"refreshSec":30}');
let currentPrice = 0, prevPrice = 0;
let chart, lineSeries, levelLines = [];
let refreshTimer = null;
let candles = [];
let currentTF = '1m';
let notifGranted = Notification.permission === 'granted';
let lastNearAlert = {}, lastTouchAlert = {};

// ─── Init ─────────────────────────────────────────────────
document.getElementById('nearZone').value = settings.nearZone;
document.getElementById('refreshSec').value = settings.refreshSec;
updateNotifUI();
initChart();
fetchPrice();
startRefresh();
renderLevels();

// ─── Chart ───────────────────────────────────────────────
function initChart() {
  const el = document.getElementById('chart');
  chart = LightweightCharts.createChart(el, {
    width: el.offsetWidth,
    height: 220,
    layout: { background:{color:'#161b22'}, textColor:'#8b949e' },
    grid: { vertLines:{color:'#21262d'}, horzLines:{color:'#21262d'} },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor:'#30363d' },
    timeScale: { borderColor:'#30363d', timeVisible:true },
    handleScroll: true, handleScale: true,
  });
  lineSeries = chart.addCandlestickSeries({
    upColor:'#3fb950', downColor:'#f85149',
    borderUpColor:'#3fb950', borderDownColor:'#f85149',
    wickUpColor:'#3fb950', wickDownColor:'#f85149',
  });
  window.addEventListener('resize', () => {
    chart.applyOptions({ width: el.offsetWidth });
  });
  fetchCandles();
}

function setTF(tf, btn) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fetchCandles();
}

async function fetchCandles() {
  // Use Binance XAUUSDT proxy for candle data
  const tfMap = {'1m':'1m','5m':'5m','15m':'15m','1h':'1h'};
  try {
    const url = `https://api.binance.com/api/v3/klines?symbol=XAUUSDT&interval=${tfMap[currentTF]}&limit=80`;
    const r = await fetch(url);
    const d = await r.json();
    if (!Array.isArray(d)) return;
    candles = d.map(k => ({
      time: Math.floor(k[0]/1000),
      open: parseFloat(k[1]),
      high: parseFloat(k[2]),
      low: parseFloat(k[3]),
      close: parseFloat(k[4]),
    }));
    lineSeries.setData(candles);
    drawLevelLines();
  } catch(e) { console.log('Candle fetch err', e); }
}

function drawLevelLines() {
  levelLines.forEach(l => { try { chart.removePriceLine(l); } catch(e){} });
  levelLines = [];
  levels.forEach(lv => {
    const isNear = currentPrice && Math.abs(lv - currentPrice) <= settings.nearZone;
    const l = lineSeries.createPriceLine({
      price: lv,
      color: isNear ? '#ffa500' : '#ffd70060',
      lineWidth: isNear ? 2 : 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true,
      title: isNear ? `⚡${lv}` : `${lv}`,
    });
    levelLines.push(l);
  });
}

// ─── Price Fetch ─────────────────────────────────────────
async function fetchPrice() {
  try {
    // Try Binance XAUUSDT
    const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=XAUUSDT');
    const d = await r.json();
    if (d.price) {
      prevPrice = currentPrice || parseFloat(d.price);
      currentPrice = parseFloat(d.price);
      updatePriceUI();
      checkAlerts();
      drawLevelLines();
      // update last candle
      if (candles.length) {
        const now = Math.floor(Date.now()/1000);
        const last = candles[candles.length-1];
        if (now - last.time < tfSeconds(currentTF)) {
          last.close = currentPrice;
          if (currentPrice > last.high) last.high = currentPrice;
          if (currentPrice < last.low) last.low = currentPrice;
          lineSeries.update(last);
        }
      }
      return;
    }
  } catch(e) {}
  // Fallback: random walk for demo
  if (!currentPrice) currentPrice = 3350;
  prevPrice = currentPrice;
  currentPrice += (Math.random()-0.5)*2;
  updatePriceUI();
}

function tfSeconds(tf) {
  return {'1m':60,'5m':300,'15m':900,'1h':3600}[tf]||60;
}

function updatePriceUI() {
  const el = document.getElementById('livePrice');
  const chgEl = document.getElementById('priceChg');
  el.textContent = currentPrice.toFixed(2);
  const diff = currentPrice - prevPrice;
  if (diff > 0) { el.style.color='#3fb950'; chgEl.className='price-chg up'; chgEl.textContent=`▲ ${diff.toFixed(2)}`; }
  else if (diff < 0) { el.style.color='#f85149'; chgEl.className='price-chg down'; chgEl.textContent=`▼ ${Math.abs(diff).toFixed(2)}`; }
  else { el.style.color='#ffd700'; chgEl.className='price-chg neu'; chgEl.textContent='─'; }
  updateNearestCards();
  renderLevels();
}

function updateNearestCards() {
  if (!levels.length || !currentPrice) return;
  const above = levels.filter(l => l >= currentPrice).sort((a,b)=>a-b);
  const below = levels.filter(l => l < currentPrice).sort((a,b)=>b-a);
  if (above.length) {
    const d = (above[0]-currentPrice).toFixed(2);
    document.getElementById('nearest-above').textContent = above[0].toFixed(2);
    document.getElementById('dist-above').textContent = `+$${d} away`;
  }
  if (below.length) {
    const d = (currentPrice-below[0]).toFixed(2);
    document.getElementById('nearest-below').textContent = below[0].toFixed(2);
    document.getElementById('dist-below').textContent = `-$${d} away`;
  }
}

// ─── Alerts ───────────────────────────────────────────────
function checkAlerts() {
  if (!levels.length || !currentPrice) return;
  let nearHit = null, touchHit = null;
  levels.forEach(lv => {
    const dist = Math.abs(lv - currentPrice);
    if (dist <= 0.5) touchHit = lv;
    else if (dist <= settings.nearZone) { if (!nearHit || dist < Math.abs(nearHit-currentPrice)) nearHit = lv; }
  });

  const bannerNear = document.getElementById('banner-near');
  const bannerTouch = document.getElementById('banner-touch');

  if (touchHit) {
    const txt = `ราคาแตะ ATH Level $${touchHit.toFixed(2)}! (${currentPrice.toFixed(2)})`;
    document.getElementById('banner-touch-text').textContent = txt;
    bannerTouch.classList.add('show');
    if (!lastTouchAlert[touchHit] || Date.now()-lastTouchAlert[touchHit] > 60000) {
      sendNotif('🔴 XAUUSD Touch Alert!', txt);
      lastTouchAlert[touchHit] = Date.now();
    }
  } else { bannerTouch.classList.remove('show'); }

  if (nearHit && !touchHit) {
    const dist = Math.abs(nearHit-currentPrice).toFixed(2);
    const dir = nearHit > currentPrice ? '▲' : '▼';
    const txt = `ราคาใกล้ $${nearHit.toFixed(2)} ${dir} $${dist} (Now: ${currentPrice.toFixed(2)})`;
    document.getElementById('banner-near-text').textContent = txt;
    bannerNear.classList.add('show');
    if (!lastNearAlert[nearHit] || Date.now()-lastNearAlert[nearHit] > 120000) {
      sendNotif('🟡 XAUUSD Near Level!', txt);
      lastNearAlert[nearHit] = Date.now();
    }
  } else { bannerNear.classList.remove('show'); }
}

function sendNotif(title, body) {
  if (Notification.permission === 'granted') {
    new Notification(title, { body, icon:'https://cdn.jsdelivr.net/npm/cryptocurrency-icons@latest/svg/color/xau.svg' });
  }
}

// ─── Levels ───────────────────────────────────────────────
function renderLevels() {
  const wrap = document.getElementById('levelsList');
  if (!levels.length) { wrap.innerHTML = '<div class="empty-msg">ยังไม่มี levels</div>'; return; }
  const sorted = [...levels].sort((a,b)=>a-b);
  const above = sorted.filter(l=>l>=currentPrice).sort((a,b)=>a-b);
  const below = sorted.filter(l=>l<currentPrice).sort((a,b)=>b-a);
  const nearestAbove = above[0], nearestBelow = below[0];

  wrap.innerHTML = sorted.map(lv => {
    const dist = currentPrice ? (lv - currentPrice) : null;
    const absD = dist !== null ? Math.abs(dist).toFixed(2) : '—';
    const sign = dist !== null ? (dist>=0?'+':'-') : '';
    const isNearest = lv===nearestAbove||lv===nearestBelow;
    const isNear = dist!==null && Math.abs(dist)<=settings.nearZone;
    const dotClass = isNear ? 'dot-yellow' : (lv>currentPrice?'dot-green':'dot-red');
    return `<div class="level-row ${isNearest?'nearest':''} ${isNear&&!isNearest?'near-warn':''}">
      <div class="level-dot ${dotClass}"></div>
      <div class="level-num">$${lv.toFixed(2)}</div>
      ${isNearest?'<span class="level-tag tag-nearest">Nearest</span>':''}
      ${isNear&&!isNearest?'<span class="level-tag tag-near">Near</span>':''}
      <div class="level-dist">${sign}$${absD}</div>
      <button onclick="removeLevel(${lv})" style="background:none;border:none;color:#f85149;font-size:14px;cursor:pointer;padding-left:8px">✕</button>
    </div>`;
  }).join('');
}

function addLevel() {
  const v = parseFloat(document.getElementById('newLevel').value);
  if (!v || v<3000||v>7000) { alert('กรุณาใส่ราคา 3000–7000'); return; }
  if (!levels.includes(v)) { levels.push(v); saveL(); renderLevels(); drawLevelLines(); }
  document.getElementById('newLevel').value = '';
}

function removeLevel(lv) {
  levels = levels.filter(l=>l!==lv);
  saveL(); renderLevels(); drawLevelLines();
}

function clearLevels() {
  if (confirm('ล้าง levels ทั้งหมด?')) { levels=[]; saveL(); renderLevels(); drawLevelLines(); }
}

function importPaste() {
  const raw = document.getElementById('pasteArea').value;
  const nums = raw.split(/[\n,\s\t]+/).map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n)&&n>=3000&&n<=7000);
  if (!nums.length) { alert('ไม่พบตัวเลขที่ใช้ได้ (range 3000–7000)'); return; }
  let added = 0;
  nums.forEach(n=>{ if(!levels.includes(n)){levels.push(n);added++;} });
  saveL(); renderLevels(); drawLevelLines();
  document.getElementById('pasteArea').value = '';
  alert(`✅ เพิ่ม ${added} levels สำเร็จครับ`);
}

function saveL() { localStorage.setItem('ath_levels', JSON.stringify(levels)); }

// ─── Settings ─────────────────────────────────────────────
function saveSettings() {
  settings.nearZone = parseFloat(document.getElementById('nearZone').value)||5;
  settings.refreshSec = parseInt(document.getElementById('refreshSec').value)||30;
  localStorage.setItem('ath_settings', JSON.stringify(settings));
  startRefresh();
  alert('✅ บันทึกแล้วครับ');
}

function startRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(()=>{ fetchPrice(); if(Math.random()<0.1) fetchCandles(); }, settings.refreshSec*1000);
}

// ─── Notification ─────────────────────────────────────────
function requestNotif() {
  Notification.requestPermission().then(p=>{ notifGranted=(p==='granted'); updateNotifUI(); });
}

function updateNotifUI() {
  const el = document.getElementById('notifPerm');
  if (Notification.permission==='granted') {
    el.innerHTML = '✅ Push Notification เปิดอยู่แล้วครับ';
    el.style.borderColor = '#3fb950';
  } else {
    el.innerHTML = '🔔 Push Notification ยังไม่ได้เปิด <button class="btn btn-sm btn-gold" onclick="requestNotif()">เปิด</button>';
  }
}

// ─── Tabs ─────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const ids=['dashboard','levels','settings'];
    t.classList.toggle('active', ids[i]===id);
  });
  document.querySelectorAll('.tab-content').forEach(c=>{
    c.classList.toggle('active', c.id==='tab-'+id);
  });
  if (id==='levels') renderLevels();
}
</script>
</body>
</html>
