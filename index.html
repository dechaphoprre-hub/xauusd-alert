<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0d1117">
<title>XAUUSD ATH Alert</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',sans-serif;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;color:#ffd700}
.price-badge{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 12px;text-align:right;min-width:130px}
.price-val{font-size:22px;font-weight:700;font-family:monospace;color:#ffd700;transition:color .15s}
.price-sub{font-size:11px;margin-top:1px}
.up{color:#3fb950}.down{color:#f85149}.neu{color:#8b949e}
.tabs{display:flex;background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:57px;z-index:99}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#ffd700;border-bottom-color:#ffd700}
.tab-content{display:none}.tab-content.active{display:block}
.section{padding:12px 16px}
.sec-title{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.g{background:#3fb950;animation:blink 1.5s infinite}
.dot.r{background:#f85149}.dot.y{background:#ffa500;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.status-bar{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#8b949e;display:flex;justify-content:space-between;align-items:center;gap:8px}
.src-pill{font-size:10px;padding:2px 8px;border-radius:10px;background:#21262d;border:1px solid #30363d;white-space:nowrap}
.src-pill.live{border-color:#3fb95066;color:#3fb950}
.src-pill.err{border-color:#f8514966;color:#f85149}
.chart-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;margin-bottom:6px;position:relative}
canvas#cv{display:block;touch-action:none}
.chart-label{position:absolute;top:6px;left:10px;font-size:10px;color:#555;font-family:monospace;pointer-events:none}
.tf-row{display:flex;gap:6px;margin-bottom:12px}
.tf-btn{flex:1;padding:6px 0;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#8b949e;font-size:12px;cursor:pointer;text-align:center}
.tf-btn.active{background:#ffd700;color:#0d1117;border-color:#ffd700;font-weight:700}
.banner{padding:10px 14px;border-radius:8px;margin-bottom:8px;font-size:13px;display:none;align-items:center;gap:8px}
.banner.show{display:flex}
.bnear{background:#2e1f00;border:1px solid #d29922;color:#ffa500}
.btouch{background:#2d0f0f;border:1px solid #f85149;color:#f85149}
.alert-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.acard{background:#161b22;border-radius:10px;padding:12px;text-align:center}
.acard.above{border:1px solid #388bfd55}.acard.below{border:1px solid #f8514955}
.acard .lbl{font-size:10px;color:#8b949e;margin-bottom:6px}
.acard .lvl{font-size:17px;font-weight:700;font-family:monospace}
.acard.above .lvl{color:#58a6ff}.acard.below .lvl{color:#ffa657}
.acard .dst{font-size:11px;color:#8b949e;margin-top:3px}
.mt5-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:linear-gradient(135deg,#1a3a5c,#0d2137);border:1px solid #1f6feb;border-radius:10px;color:#58a6ff;font-size:15px;font-weight:700;text-decoration:none;margin-bottom:12px}
.levels-wrap{background:#161b22;border:1px solid #30363d;border-radius:10px;overflow:hidden;margin-bottom:12px}
.lrow{display:flex;align-items:center;padding:9px 14px;border-bottom:1px solid #21262d}
.lrow:last-child{border-bottom:none}
.lrow.hi{background:#1c2a1a}.lrow.wr{background:#2a1e0a}
.ldot{width:8px;height:8px;border-radius:50%;margin-right:10px;flex-shrink:0}
.dg{background:#3fb950}.dy{background:#ffa500}.dr{background:#f85149}
.lnum{font-family:monospace;flex:1;font-size:14px}
.ltag{font-size:10px;padding:2px 5px;border-radius:4px;margin-left:4px}
.tg{background:#1f4d2b;color:#3fb950}.ty{background:#3d2e0a;color:#ffa500}
.ldist{font-size:11px;color:#8b949e}
.lx{background:none;border:none;color:#f85149;cursor:pointer;padding-left:8px;font-size:14px}
.empty{text-align:center;color:#8b949e;padding:24px;font-size:13px}
.scard{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;margin-bottom:12px}
.irow{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.irow label{font-size:12px;color:#8b949e;width:90px;flex-shrink:0}
.inp{flex:1;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:7px 10px;color:#e6edf3;font-size:13px;outline:none}
.inp:focus{border-color:#ffd700}
.btn{padding:9px 16px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;width:100%}
.bgold{background:#ffd700;color:#0d1117}
.bred{background:#21262d;color:#f85149;border:1px solid #f85149}
.bsm{padding:6px 12px;font-size:12px;width:auto}
.parea{width:100%;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:8px;color:#e6edf3;font-size:12px;font-family:monospace;resize:vertical;min-height:80px;outline:none}
.nperm{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:10px 14px;margin-bottom:10px;font-size:12px;color:#8b949e;display:flex;align-items:center;justify-content:space-between;gap:8px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">⚡ XAUUSD</div>
  <div class="price-badge">
    <div class="price-val" id="pVal">—</div>

  </div>
</div>

<!-- DASHBOARD -->
<div class="tab-content active" id="tab-dashboard">
<div class="section">
  <div id="bnear" class="banner bnear">🟡 <span id="bnear-txt"></span></div>

  <div class="status-bar">
    <span><span class="dot g" id="pdot"></span>&nbsp;<span id="pstatus">เชื่อมต่อ...</span></span>

    <div class="irow"><label>Near Zone (±$)</label><input class="inp" type="number" id="nz" value="5" min="1" max="500"></div>

    <button class="btn bgold" onclick="addLv()">➕ เพิ่ม</button>

    <br><br>
    <button class="btn bgold" onclick="importPaste()">📥 Import</button>

<script>
// ── State ────────────────────────────────────────────────────────
let lvs  = JSON.parse(localStorage.getItem('ath_lvs')||'[]');
let cfg  = JSON.parse(localStorage.getItem('ath_cfg')||'{"nz":5}');
let price=0, prevP=0;
let lastNA={}, lastTA={};
let tf=1;
let candles={}; // tf -> [{t,o,h,l,c}]
let chartW=0, chartH=260;
let needRedraw=false;
let ws=null, wsAlive=false, wsRetry=0;
let restTimer=null; // fallback polling

document.getElementById('nz').value=cfg.nz;
updateNperm();
initChart();
boot();

async function boot(){
  await fetchCandles(tf);
  connectWS();
  renderLvs();
}

// ── WebSocket — Coinbase Advanced Trade ──────────────────────────
function connectWS(){
  try{ if(ws) ws.close(); }catch(e){}
  ws = new WebSocket('wss://advanced-trade-ws.coinbase.com/ws');

  ws.onopen = () => {
    wsAlive=true; wsRetry=0;
    ws.send(JSON.stringify({type:'subscribe',product_ids:['XAU-USD'],channel:'ticker'}));
    setSt(true,'WebSocket Live','Coinbase WS ✓','live');
    clearInterval(restTimer); restTimer=null;
  };

  ws.onmessage = e => {
    try{
      const d=JSON.parse(e.data);
      for(const ev of (d.events||[])){
        for(const t of (ev.tickers||[])){
          const p=parseFloat(t.price);
          if(p>2000){ onTick(p); return; }
        }
      }
    }catch(_){}
  };

  ws.onclose = ws.onerror = () => {
    wsAlive=false;
    setSt(false,'WS หลุด — fallback REST','REST','err');
    // fallback: REST every 3s
    if(!restTimer) restTimer=setInterval(fetchPriceREST, 3000);
    // WS reconnect backoff
    const d=Math.min(30000,1500*Math.pow(2,wsRetry++));
    setTimeout(()=>{ connectWS(); fetchCandles(tf); }, d);
  };
}

// ── REST fallback ────────────────────────────────────────────────
async function fetchPriceREST(){
  try{
    const r=await fetch('https://api.coinbase.com/v2/prices/XAU-USD/spot',
      {signal:AbortSignal.timeout(4000)});
    const d=await r.json();
    const p=parseFloat(d?.data?.amount);
    if(p>2000){ onTick(p); setSt(true,`REST ${new Date().toLocaleTimeString('th-TH')}`,'Coinbase REST','live'); }
  }catch(e){
    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/GC%3DF?interval=1m&range=1d',
        {signal:AbortSignal.timeout(5000)});
      const d=await r.json();
      const p=parseFloat(d?.chart?.result?.[0]?.meta?.regularMarketPrice);
      if(p>2000){ onTick(p); setSt(true,'Yahoo','Yahoo ✓','live'); }
    }catch(_){
      setSt(false,'เชื่อมต่อไม่ได้','—','err');
    }
  }
}

// ── On each price tick ───────────────────────────────────────────
function onTick(p){
  prevP=price||p; price=p;
  updatePriceUI();
  updateLastCandle(p);
  needRedraw=true;
  updateCards();
  checkAlerts();
  renderLvs();
}

// ── Price UI ─────────────────────────────────────────────────────
function updatePriceUI(){
  const el=document.getElementById('pVal');
  const chg=document.getElementById('pChg');
  const diff=price-prevP;
  el.textContent=price.toFixed(2);
  if(Math.abs(diff)<0.005){el.style.color='#ffd700';chg.className='price-sub neu';chg.textContent='─';}
  else if(diff>0){el.style.color='#3fb950';chg.className='price-sub up';chg.textContent=`▲ ${diff.toFixed(2)}`;}
  else{el.style.color='#f85149';chg.className='price-sub down';chg.textContent=`▼ ${Math.abs(diff).toFixed(2)}`;}
}

function setSt(ok,txt,src,pill){
  document.getElementById('pdot').className='dot '+(ok?'g':'r');
  document.getElementById('pstatus').textContent=txt;
  if(src){ const s=document.getElementById('srcPill'); s.textContent=src; s.className='src-pill '+(pill||''); }
}

// ── Candles from Coinbase Exchange ───────────────────────────────
async function fetchCandles(tfMin){
  const gran={1:60,5:300,15:900,60:3600}[tfMin]||60;
  const end=Math.floor(Date.now()/1000);
  const start=end-gran*150;
  try{
    const r=await fetch(
      `https://api.exchange.coinbase.com/products/XAU-USD/candles?granularity=${gran}&start=${start}&end=${end}`,
      {signal:AbortSignal.timeout(8000)});
    const raw=await r.json();
    if(!Array.isArray(raw)||!raw.length) throw new Error('empty');
    candles[tfMin]=raw.slice().reverse().map(c=>({
      t:c[0],o:+c[3],h:+c[2],l:+c[1],c:+c[4]
    }));
    document.getElementById('cdot').className='dot g';
  }catch(e){
    document.getElementById('cdot').className='dot y';
    if(!candles[tfMin]&&price>0) buildSynth(tfMin);
  }
  needRedraw=true;
}

function buildSynth(tfMin){
  const gran={1:60,5:300,15:900,60:3600}[tfMin]||60;
  const now=Math.floor(Date.now()/1000);
  let p=price||3300; const arr=[];
  for(let i=79;i>=0;i--){
    const t=now-gran*(i+1), o=p;
    const h=o+Math.random()*3, l=o-Math.random()*3, c=l+Math.random()*(h-l);
    arr.push({t,o,h,l,c}); p=c+(Math.random()-.48)*1.5;
  }
  candles[tfMin]=arr;
}

// ── Update last candle on tick ───────────────────────────────────
function updateLastCandle(p){
  const gran={1:60,5:300,15:900,60:3600}[tf]||60;
  const now=Math.floor(Date.now()/1000);
  const ct=now-now%gran;
  if(!candles[tf]||!candles[tf].length) return;
  const arr=candles[tf], last=arr[arr.length-1];
  if(last.t===ct){
    last.c=p; if(p>last.h)last.h=p; if(p<last.l)last.l=p;
  } else if(ct>last.t){
    arr.push({t:ct,o:p,h:p,l:p,c:p});
    if(arr.length>300) arr.shift();
  }
}

// ── Canvas chart — RAF loop ──────────────────────────────────────
function initChart(){
  const wrap=document.getElementById('chartWrap');
  chartW=wrap.offsetWidth;
  const cv=document.getElementById('cv');
  cv.style.height=chartH+'px';
  window.addEventListener('resize',()=>{ chartW=wrap.offsetWidth; needRedraw=true; });
  requestAnimationFrame(rafLoop);
}

function rafLoop(){
  if(needRedraw){ drawChart(); needRedraw=false; }
  requestAnimationFrame(rafLoop);
}

function drawChart(){
  const cv=document.getElementById('cv');
  const dpr=window.devicePixelRatio||1;
  const wrap=document.getElementById('chartWrap');
  chartW=wrap.offsetWidth;
  if(cv.width!==chartW*dpr||cv.height!==chartH*dpr){
    cv.width=chartW*dpr; cv.height=chartH*dpr;
    cv.style.width=chartW+'px'; cv.style.height=chartH+'px';
  }
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const W=chartW, H=chartH;

  ctx.fillStyle='#161b22'; ctx.fillRect(0,0,W,H);

  const arr=candles[tf];
  if(!arr||!arr.length){
    ctx.fillStyle='#8b949e'; ctx.font='13px Segoe UI';
    ctx.textAlign='center'; ctx.fillText('กำลังโหลด chart...',W/2,H/2); return;
  }

  const vis=arr.slice(-80);
  const pad={t:10,b:22,l:4,r:58};
  const cw=W-pad.l-pad.r, ch=H-pad.t-pad.b;
  const bw=Math.max(2,Math.floor(cw/vis.length)-1);

  let mn=Math.min(...vis.map(c=>c.l));
  let mx=Math.max(...vis.map(c=>c.h));
  lvs.forEach(lv=>{ if(lv>mn-20&&lv<mx+20){mn=Math.min(mn,lv-4);mx=Math.max(mx,lv+4);} });
  const rng=mx-mn||1;
  const sy=v=>pad.t+ch*(1-(v-mn)/rng);

  // horizontal grid + price labels
  ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
  ctx.font='9px monospace'; ctx.fillStyle='#555'; ctx.textAlign='left';
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(i/4);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillText((mx-rng*(i/4)).toFixed(1), W-pad.r+3, y+3);
  }

  // ATH level lines
  ctx.setLineDash([3,4]);
  lvs.forEach(lv=>{
    if(lv<mn||lv>mx) return;
    const y=sy(lv), near=price&&Math.abs(lv-price)<=cfg.nz;
    ctx.strokeStyle=near?'#ffa500':'rgba(255,215,0,0.25)';
    ctx.lineWidth=near?1.5:1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle=near?'#ffa500':'rgba(255,215,0,0.45)';
    ctx.font='9px monospace'; ctx.textAlign='right';
    ctx.fillText(lv.toFixed(near?2:0), W-pad.r-2, y-2);
  });
  ctx.setLineDash([]);

  // candle bars
  vis.forEach((c,i)=>{
    const x=pad.l+i*(cw/vis.length);
    const cx=x+bw/2;
    const bull=c.c>=c.o;
    const col=bull?'#3fb950':'#f85149';
    ctx.strokeStyle=col; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx,sy(c.h)); ctx.lineTo(cx,sy(c.l)); ctx.stroke();
    ctx.fillStyle=col;
    const y1=sy(Math.max(c.o,c.c)), y2=sy(Math.min(c.o,c.c));
    ctx.fillRect(x, y1, bw*0.85, Math.max(1.5, y2-y1));
  });

  // current price line + label
  if(price&&price>=mn&&price<=mx){
    const y=sy(price);
    ctx.setLineDash([2,3]);
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.setLineDash([]);
    const lw=pad.r-3;
    ctx.fillStyle='#ffd700';
    ctx.fillRect(W-pad.r+1, y-9, lw, 18);
    ctx.fillStyle='#0d1117'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
    ctx.fillText(price.toFixed(1), W-pad.r+1+lw/2, y+3.5);
  }

  document.getElementById('chartLabel').textContent=
    `${tf<60?tf+'m':tf/60+'h'} | ${vis.length} bars | ${new Date().toLocaleTimeString('th-TH')}`;
}

function setTF(m,btn){
  tf=m;
  document.querySelectorAll('.tf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(candles[m]){ needRedraw=true; }
  else fetchCandles(m);
}

// ── Nearest cards ─────────────────────────────────────────────────
function updateCards(){
  if(!lvs.length||!price) return;
  const ab=lvs.filter(l=>l>=price).sort((a,b)=>a-b);
  const bl=lvs.filter(l=>l<price).sort((a,b)=>b-a);
  if(ab.length){ document.getElementById('nabove').textContent='$'+ab[0].toFixed(2);
    document.getElementById('dabove').textContent=`+$${(ab[0]-price).toFixed(2)} away`; }
  if(bl.length){ document.getElementById('nbelow').textContent='$'+bl[0].toFixed(2);
    document.getElementById('dbelow').textContent=`-$${(price-bl[0]).toFixed(2)} away`; }
}

// ── Alerts ────────────────────────────────────────────────────────
function checkAlerts(){
  if(!lvs.length||!price) return;
  let near=null, touch=null;
  lvs.forEach(lv=>{
    const d=Math.abs(lv-price);
    if(d<=0.6) touch=lv;
    else if(d<=cfg.nz){ if(!near||d<Math.abs(near-price)) near=lv; }
  });
  const bn=document.getElementById('bnear'), bt=document.getElementById('btouch');
  if(touch){
    const t=`ราคาแตะ ATH $${touch.toFixed(2)}! (Now: ${price.toFixed(2)})`;
    document.getElementById('btouch-txt').textContent=t; bt.classList.add('show');
    if(!lastTA[touch]||Date.now()-lastTA[touch]>60000){ notify('🔴 Touch!',t); lastTA[touch]=Date.now(); }
  } else bt.classList.remove('show');
  if(near&&!touch){
    const d=Math.abs(near-price).toFixed(2);
    const t=`ใกล้ $${near.toFixed(2)} ห่าง $${d}`;
    document.getElementById('bnear-txt').textContent=t; bn.classList.add('show');
    if(!lastNA[near]||Date.now()-lastNA[near]>120000){ notify('🟡 Near!',t); lastNA[near]=Date.now(); }
  } else bn.classList.remove('show');
}
function notify(t,b){ if(Notification.permission==='granted') new Notification(t,{body:b}); }

// ── Levels list ───────────────────────────────────────────────────
function renderLvs(){
  const wrap=document.getElementById('lvlList');
  if(!lvs.length){ wrap.innerHTML='<div class="empty">ยังไม่มี levels</div>'; return; }
  const s=[...lvs].sort((a,b)=>a-b);
  const nA=s.filter(l=>l>=price).sort((a,b)=>a-b)[0];
  const nB=s.filter(l=>l<price).sort((a,b)=>b-a)[0];
  wrap.innerHTML=s.map(lv=>{
    const d=price?(lv-price):null;
    const ad=d!==null?Math.abs(d).toFixed(2):'—';
    const sg=d!==null?(d>=0?'+':'-'):'';
    const near=d!==null&&Math.abs(d)<=cfg.nz;
    const isN=lv===nA||lv===nB;
    const dot=near?'dy':(lv>price?'dg':'dr');
    return `<div class="lrow ${isN?'hi':''} ${near&&!isN?'wr':''}">
      <div class="ldot ${dot}"></div>
      <span class="lnum">$${lv.toFixed(2)}</span>
      ${isN?'<span class="ltag tg">Nearest</span>':''}
      ${near&&!isN?'<span class="ltag ty">Near</span>':''}
      <span class="ldist">${sg}$${ad}</span>
      <button class="lx" onclick="delLv(${lv})">✕</button>
    </div>`;
  }).join('');
}

function addLv(){
  const v=parseFloat(document.getElementById('newLv').value);
  if(!v||v<3000||v>7000){ alert('ใส่ราคา 3000–7000'); return; }
  if(!lvs.includes(v)){ lvs.push(v); saveL(); renderLvs(); needRedraw=true; }
  document.getElementById('newLv').value='';
}
function delLv(v){ lvs=lvs.filter(l=>l!==v); saveL(); renderLvs(); needRedraw=true; }
function clearLvs(){ if(confirm('ล้าง levels ทั้งหมด?')){ lvs=[]; saveL(); renderLvs(); needRedraw=true; } }
function importPaste(){
  const raw=document.getElementById('parea').value;
  const nums=raw.split(/[\n,\s\t]+/).map(s=>parseFloat(s)).filter(n=>!isNaN(n)&&n>=3000&&n<=7000);
  if(!nums.length){ alert('ไม่พบตัวเลขที่ใช้ได้'); return; }
  let added=0;
  nums.forEach(n=>{ if(!lvs.includes(n)){ lvs.push(n); added++; } });
  saveL(); renderLvs(); needRedraw=true;
  document.getElementById('parea').value='';
  alert(`✅ เพิ่ม ${added} levels`);
}
function saveL(){ localStorage.setItem('ath_lvs',JSON.stringify(lvs)); }

// ── Settings ──────────────────────────────────────────────────────
function saveSett(){
  cfg.nz=parseFloat(document.getElementById('nz').value)||5;
  localStorage.setItem('ath_cfg',JSON.stringify(cfg));
  needRedraw=true; alert('✅ บันทึกแล้ว');
}

// ── Notification ──────────────────────────────────────────────────
function reqNotif(){ Notification.requestPermission().then(()=>updateNperm()); }
function updateNperm(){
  const el=document.getElementById('nperm');
  if(Notification.permission==='granted'){ el.innerHTML='✅ Push Notification เปิดอยู่'; el.style.borderColor='#3fb950'; }
  else el.innerHTML='🔔 ยังไม่ได้เปิด <button class="btn bgold bsm" onclick="reqNotif()">เปิด</button>';
}

// ── Tabs ──────────────────────────────────────────────────────────
function goTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',['dashboard','levels','settings'][i]===id));
  document.querySelectorAll('.tab-content').forEach(c=>
    c.classList.toggle('active',c.id==='tab-'+id));
  if(id==='dashboard') needRedraw=true;
}
</script>
</body>
</html>
